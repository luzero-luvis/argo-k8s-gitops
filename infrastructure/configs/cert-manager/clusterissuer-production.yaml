apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-production
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: luvis@luzero.io
    privateKeySecretRef:
      name: letsencrypt-production
    solvers:
      - dns01:
          digitalocean:
            tokenSecretRef:
              name: digitalocean-api-token
              key: api-token
        selector:
          dnsZones:
            - "luzero.online"
