---
# profiles-kfam: allow centraldashboard + Cilium-bypass internal calls
# (Cilium eBPF bypasses Envoy outbound so no mTLS source principal is available
#  for in-cluster HTTP calls; the second rule matches those by absence of
#  kubeflow-userid header)
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: profiles-kfam
  namespace: kubeflow
  labels:
    kustomize.component: profiles
spec:
  action: ALLOW
  selector:
    matchLabels:
      kustomize.component: profiles
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/kubeflow/sa/centraldashboard
    - when:
        - key: request.headers[kubeflow-userid]
          notValues:
            - '*'
