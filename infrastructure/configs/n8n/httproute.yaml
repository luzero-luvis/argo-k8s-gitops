---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: n8n-https
  namespace: n8n
spec:
  parentRefs:
    - name: luzero-gateway
      namespace: istio-system
      sectionName: slicearrow-http
  hostnames:
    - "n8n-csr-interns.slicearrow.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /webhook/
        - path:
            type: PathPrefix
            value: /webhook-waiting/
      backendRefs:
        - name: n8n-webhook
          port: 5678
    # Disable request timeout so long-lived WebSocket (/rest/push) connections
    # are not dropped by Envoy after the default HTTP request timeout.
    - timeouts:
        request: "0s"
      backendRefs:
        - name: n8n
          port: 5678
