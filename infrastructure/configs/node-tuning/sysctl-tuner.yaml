apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: sysctl-tuner
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app: sysctl-tuner
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: sysctl-tuner
    spec:
      hostPID: true
      hostNetwork: true
      priorityClassName: system-node-critical
      tolerations:
      - operator: Exists
      initContainers:
      - name: sysctl-set
        image: busybox:1.36
        securityContext:
          privileged: true
        command:
        - sh
        - -c
        - |
          sysctl -w fs.inotify.max_user_instances=1024
          sysctl -w fs.inotify.max_user_watches=524288
          # Write to sysctl.d for persistence across reboots
          cat > /host-etc/sysctl.d/99-kubernetes-inotify.conf << 'CONF'
          fs.inotify.max_user_instances = 1024
          fs.inotify.max_user_watches = 524288
          CONF
          echo "sysctl tuning applied"
        volumeMounts:
        - name: host-etc
          mountPath: /host-etc
      containers:
      - name: pause
        image: gcr.io/google_containers/pause:3.2
        resources:
          requests:
            cpu: 1m
            memory: 1Mi
          limits:
            cpu: 10m
            memory: 8Mi
      volumes:
      - name: host-etc
        hostPath:
          path: /etc
