apiVersion: v1
kind: ConfigMap
metadata:
  name: sync-script
  namespace: notebook-gateway-sync
data:
  sync.sh: |
    #!/bin/sh
    GATEWAY_NS="istio-system"
    GATEWAY_NAME="luzero-gateway"
    GATEWAY_SA="luzero-gateway-istio"
    HOSTNAME="kubeflow.luzero.online"

    while true; do
    echo "$(date): notebook-gateway-sync start"

    kubectl get profiles \
      -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.spec.owner.name}{"\n"}{end}' \
      > /tmp/profiles.txt 2>/dev/null

    while IFS='	' read -r ns owner; do
    [ -z "$ns" ] && continue
    [ -z "$owner" ] && continue
    cat > /tmp/ap.yaml <<APEOF
    apiVersion: security.istio.io/v1
    kind: AuthorizationPolicy
    metadata:
      name: luzero-gateway-access
      namespace: ${ns}
    spec:
      action: ALLOW
      rules:
        - when:
            - key: request.headers[kubeflow-userid]
              values:
                - ${owner}
    APEOF
    kubectl apply --server-side --force-conflicts -f /tmp/ap.yaml
    done < /tmp/profiles.txt

    kubectl get notebooks -A \
      -o jsonpath='{range .items[*]}{.metadata.namespace}{"\n"}{end}' \
      2>/dev/null | sort -u > /tmp/nb_namespaces.txt

    while read -r ns; do
    [ -z "$ns" ] && continue
    RULES=""
    for nb in $(kubectl get notebooks -n "${ns}" \
      -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' 2>/dev/null); do
    [ -z "$nb" ] && continue
    RULES="${RULES}
        - matches:
            - path:
                type: PathPrefix
                value: /notebook/${ns}/${nb}/
          backendRefs:
            - name: ${nb}
              port: 80"
    done
    [ -z "$RULES" ] && continue
    cat > /tmp/httproute.yaml <<RTEOF
    apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    metadata:
      name: notebooks
      namespace: ${ns}
    spec:
      parentRefs:
        - name: ${GATEWAY_NAME}
          namespace: ${GATEWAY_NS}
          sectionName: https
        - name: ${GATEWAY_NAME}
          namespace: ${GATEWAY_NS}
          sectionName: http
      hostnames:
        - "${HOSTNAME}"
      rules:${RULES}
    RTEOF
    kubectl apply --server-side --force-conflicts -f /tmp/httproute.yaml
    done < /tmp/nb_namespaces.txt

    echo "$(date): sync complete, sleeping 30s"
    sleep 30
    done
