apiVersion: apps/v1
kind: Deployment
metadata:
  name: notebook-gateway-sync
  namespace: notebook-gateway-sync
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notebook-gateway-sync
  template:
    metadata:
      labels:
        app: notebook-gateway-sync
    spec:
      serviceAccountName: notebook-gateway-sync
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: sync
          image: docker.io/alpine/k8s:1.32.0
          command: ["/bin/sh", "/scripts/sync.sh"]
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          configMap:
            name: sync-script
            defaultMode: 0755
