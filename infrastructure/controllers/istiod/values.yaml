autoscaleMin: 1

meshConfig:
  extensionProviders:
    - name: oauth2-proxy
      envoyExtAuthzHttp:
        service: oauth2-proxy.oauth2-proxy.svc.cluster.local
        port: 80
        includeHeadersInCheck:
          - cookie
          - authorization
        headersToUpstreamOnAllow:
          - authorization
          - x-auth-request-user
          - x-auth-request-email
          - x-auth-request-access-token
        headersToDownstreamOnDeny:
          - content-type
          - set-cookie

pilot:
  env:
    PILOT_ENABLE_GATEWAY_API: "true"
    PILOT_ENABLE_ALPHA_GATEWAY_API: "true"

resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1024Mi

telemetry:
  v2:
    enabled: true
