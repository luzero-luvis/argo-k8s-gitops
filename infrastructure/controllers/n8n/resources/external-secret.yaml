---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: n8n-encryption-key
  namespace: n8n
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: n8n-encryption-key
    creationPolicy: Owner
  data:
    - secretKey: N8N_ENCRYPTION_KEY
      remoteRef:
        key: kv/data/devops/n8n
        property: encryption-key
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: n8n-postgresql
  namespace: n8n
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: n8n-postgresql
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: kv/data/devops/n8n
        property: postgres-password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: n8n-redis
  namespace: n8n
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: n8n-redis
    creationPolicy: Owner
  data:
    - secretKey: redis-password
      remoteRef:
        key: kv/data/devops/n8n
        property: redis-password
